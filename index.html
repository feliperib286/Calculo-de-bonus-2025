<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bônus 2025 – Gestão Multi-Escola (Jacareí)</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --az:#0D2B55;--az2:#1A4A8A;--az3:#3B82F6;--az-bg:#EBF2FB;
  --ok:#14532D;--ok-bg:#DCFCE7;--ok-bd:#86EFAC;
  --wa:#92400E;--wa-bg:#FEF3C7;--wa-bd:#FCD34D;
  --er:#7F1D1D;--er-bg:#FEE2E2;--er-bd:#FCA5A5;
  --gr:#6B7280;--bd:#D1D5DB;--bg:#F1F5F9;--wh:#fff;
  --r:10px;--sh:0 2px 10px rgba(0,0,0,.08);
  --ft:'Inter',sans-serif;--fh:'Sora',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ft);background:var(--bg);color:#1e2836;font-size:13px;line-height:1.6;}
header{background:linear-gradient(135deg,var(--az),var(--az2));color:#fff;padding:1.2rem 1.75rem;}
header h1{font-family:var(--fh);font-size:1.1rem;margin-bottom:4px;}
.wrap{max-width:1200px;margin:0 auto;padding:1rem;}
.grid{display:grid;grid-template-columns:1fr 400px;gap:1.5rem;}
@media(max-width:960px){.grid{grid-template-columns:1fr;}}

/* Cards e Seções */
.card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:1.15rem;box-shadow:var(--sh);margin-bottom:1rem;}
.ctit{font-family:var(--fh);font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--az2);margin-bottom:1rem;display:flex;align-items:center;gap:6px;}
.ua-card{border-left:5px solid var(--az3);background:#fcfdff;margin-bottom:1.5rem;padding:1rem;border-radius:8px;border:1px solid var(--bd);border-left-width:6px;}

/* Inputs */
label{display:block;font-size:.75rem;font-weight:600;margin-bottom:4px;}
textarea, input, select {width:100%;padding:10px;border:1.5px solid var(--bd);border-radius:8px;font-family:inherit;}
textarea{height:80px;background:var(--az-bg);border:2px dashed var(--az3);}

/* Botões */
.btn-recalc{background:var(--az2);color:#fff;border:none;padding:12px;border-radius:8px;font-weight:700;cursor:pointer;width:100%;margin-top:10px;transition:0.2s;}
.btn-recalc:hover{background:var(--az3);transform:translateY(-2px);}

/* Alertas */
.badge-escola{background:var(--az);color:#fff;padding:4px 10px;border-radius:20px;font-size:0.7rem;margin-bottom:10px;display:inline-block;}
.err-box{background:var(--er-bg);color:var(--er);padding:10px;border-radius:6px;font-size:0.75rem;margin-top:10px;border:1px solid var(--er-bd);}
</style>
</head>
<body>

<header>
  <h1>Bônus 2025 – Diagnóstico Multi-Escolas</h1>
  <p>Fiel aos Códigos Oficiais e Consolidação de Dias Reais</p>
</header>

<div class="wrap">
  <div class="grid">
    <div>
        <div class="card">
            <div class="ctit">Importação de Dados</div>
            <label>Cole aqui o conteúdo do Portalnet (Linhas das Escolas)</label>
            <textarea id="raw-portalnet" placeholder="Copie e cole as linhas aqui..." oninput="processarDados()"></textarea>
            <button class="btn-recalc" onclick="processarDados()">🔄 RECALCULAR TUDO</button>
        </div>

        <div id="container-escolas">
            </div>
    </div>

    <div id="resultado-geral">
        <div class="card" style="position: sticky; top: 1rem;">
            <div class="ctit">Resumo Consolidado</div>
            <div id="res-total">Aguardando dados...</div>
        </div>
    </div>
  </div>
</div>

<script>
// Códigos oficiais baseados no seu PDF/DOC
const DISCIPLINAS = {
    "1100": "LÍNGUA PORTUGUESA", "1300": "MATEMÁTICA", "1600": "HISTÓRIA", "1700": "GEOGRAFIA",
    "1900": "ED. FÍSICA", "1200": "INGLÊS", "1800": "ARTE", "8468": "SOCIOLOGIA (INOVA)",
    "0500": "SALA DE RECURSOS", "7800": "PROJETO DE VIDA", "7900": "TECNOLOGIA"
};

function parseData(str) {
    const p = str.split('/');
    return p.length === 3 ? new Date(p[2], p[1]-1, p[0]) : null;
}

function processarDados() {
    const texto = document.getElementById('raw-portalnet').value;
    if (!texto.trim()) return;

    const linhas = texto.split('\n');
    const uas = {}; // Agrupador por UA

    linhas.forEach(linha => {
        const col = linha.split(/\t|\s{2,}/).map(s => s.trim());
        if (col.length >= 10) {
            const ua = col[13] || "UA NÃO INFORMADA";
            if (!uas[ua]) uas[ua] = [];
            uas[ua].push({
                ini: col[0], fim: col[1], dias: parseInt(col[3]) || 0,
                disc: col[10], idesp: parseFloat(col[11]) || 0, grau: col[8]
            });
        }
    });

    renderizarEscolas(uas);
}

function renderizarEscolas(uas) {
    const container = document.getElementById('container-escolas');
    container.innerHTML = "";
    let totalDiasGeral = 0;
    let periodosGeral = [];

    Object.keys(uas).forEach(uaCodigo => {
        const lancamentos = uas[uaCodigo];
        let somaDiasEscola = 0;
        let errosUA = [];

        const uaDiv = document.createElement('div');
        uaDiv.className = 'ua-card';
        
        let htmlLancamentos = "";
        lancamentos.forEach(l => {
            somaDiasEscola += l.dias;
            totalDiasGeral += l.dias; // Note: Isso ainda é a soma bruta para exibição
            periodosGeral.push({start: parseData(l.ini), end: parseData(l.fim)});

            if (l.idesp === 0) errosUA.push(`Código ${l.disc}: IDESP zerado.`);
            
            htmlLancamentos += `
                <div style="font-size:0.8rem; border-bottom:1px solid #eee; padding:5px 0;">
                    <strong>${l.ini} - ${l.fim}</strong> | 
                    Disc: ${DISCIPLINAS[l.disc] || l.disc} | 
                    Dias: ${l.dias} | IDESP: ${l.idesp}
                </div>`;
        });

        uaDiv.innerHTML = `
            <div class="badge-escola">ESCOLA / UA: ${uaCodigo}</div>
            <div style="margin-bottom:10px;">${htmlLancamentos}</div>
            <div style="font-weight:700; color:var(--az2)">Total nesta UA: ${somaDiasEscola} dias</div>
            ${errosUA.length > 0 ? `<div class="err-box">⚠️ ${errosUA.join('<br>')}</div>` : ''}
            <button class="btn-recalc" style="padding:5px; font-size:0.7rem; background:var(--gr)" onclick="processarDados()">Recalcular UA ${uaCodigo}</button>
        `;
        container.appendChild(uaDiv);
    });

    calcularFinal(periodosGeral);
}

// Função para evitar a duplicidade que você mencionou
function calcularFinal(intervalos) {
    if (intervalos.length === 0) return;
    
    // Ordenar e Mesclar para não passar de 365 dias
    intervalos.sort((a,b) => a.start - b.start);
    let merged = [];
    if(intervalos[0].start) {
        let current = intervalos[0];
        for(let i=1; i<intervalos.length; i++){
            if(intervalos[i].start <= current.end){
                current.end = new Date(Math.max(current.end, intervalos[i].end));
            } else {
                merged.push(current);
                current = intervalos[i];
            }
        }
        merged.push(current);
    }

    const diasReais = merged.reduce((acc, range) => {
        return acc + Math.round((range.end - range.start) / (1000*60*60*24)) + 1;
    }, 0);

    const elegivel = diasReais >= 244;

    document.getElementById('res-total').innerHTML = `
        <div style="font-size:1.5rem; font-weight:800; color:${elegivel?'var(--ok)':'var(--er)'}">
            ${diasReais} DIAS REAIS
        </div>
        <p>${elegivel ? '✅ ELEGÍVEL AO BÔNUS' : '🚨 NÃO ATINGIU 244 DIAS'}</p>
        <div style="margin-top:10px; font-size:0.7rem; color:var(--gr)">
            *O cálculo consolidou períodos de múltiplas escolas para evitar contagem duplicada.
        </div>
    `;
}
</script>
</body>
</html>
