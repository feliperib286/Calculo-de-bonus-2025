<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bônus 2025 – Diagnóstico Fiel ao PDF (GOE Jacareí)</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --az:#0D2B55;--az2:#1A4A8A;--az3:#3B82F6;--az-bg:#EBF2FB;
  --ok:#14532D;--ok-bg:#DCFCE7;--ok-bd:#86EFAC;
  --wa:#92400E;--wa-bg:#FEF3C7;--wa-bd:#FCD34D;
  --er:#7F1D1D;--er-bg:#FEE2E2;--er-bd:#FCA5A5;
  --gr:#6B7280;--bd:#D1D5DB;--bg:#F1F5F9;--wh:#fff;
  --r:10px;--sh:0 2px 10px rgba(0,0,0,.08);
  --ft:'Inter',sans-serif;--fh:'Sora',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--ft);background:var(--bg);color:#1e2836;font-size:13px;line-height:1.6;}
header{background:linear-gradient(135deg,var(--az),var(--az2));color:#fff;padding:1.2rem 1.75rem;display:flex;align-items:center;gap:1rem;}
.hico{width:46px;height:46px;background:rgba(255,255,255,.18);border-radius:12px;display:grid;place-items:center;font-size:22px;}
header h1{font-family:var(--fh);font-size:1.05rem;font-weight:700;}
nav{background:var(--az);display:flex;padding:0 1.75rem;gap:2px;}
.tab{padding:.55rem 1.1rem;font-size:.78rem;font-weight:600;color:rgba(255,255,255,.5);background:none;border:none;cursor:pointer;border-bottom:3px solid transparent;transition:.15s;}
.tab.on{color:#fff;border-bottom-color:#60A5FA;}
.wrap{max-width:1200px;margin:0 auto;padding:1rem;}
.pnl{display:none;}.pnl.on{display:block;}
.grid{display:grid;grid-template-columns:580px 1fr;gap:1.2rem;}
@media(max-width:960px){.grid{grid-template-columns:1fr;}}
.card{background:var(--wh);border:1px solid var(--bd);border-radius:var(--r);padding:1.15rem;box-shadow:var(--sh);margin-bottom:.9rem;}
.ctit{font-family:var(--fh);font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--az2);margin-bottom:.9rem;display:flex;align-items:center;gap:6px;}
.ctit::before{content:'';width:3px;height:13px;background:var(--az2);border-radius:2px;}
label{display:block;font-size:.74rem;font-weight:600;color:#374151;margin-bottom:3px;}
input,select,textarea{width:100%;padding:8px 10px;font-size:0.85rem;border:1.5px solid var(--bd);border-radius:7px;background:var(--wh);}
.lp{background:#F8FAFD;border:1.5px solid var(--bd);border-radius:8px;padding:0.9rem;margin-bottom:0.65rem;}
.lp-alert{font-size:0.75rem;margin-top:0.5rem;padding:0.5rem;border-radius:6px;display:none;}
.lp-alert.show{display:block;}
.lp-alert.err{background:var(--er-bg);color:var(--er);border:1px solid var(--er-bd);}
.lp-alert.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd);}
.tref{width:100%;border-collapse:collapse;font-size:0.75rem;}
.tref th{background:var(--az2);color:#fff;padding:8px;text-align:left;}
.tref td{padding:7px;border-bottom:1px solid #F3F4F6;}
.badge{padding:2px 6px;border-radius:4px;font-size:0.6rem;font-weight:700;text-transform:uppercase;}
.esp{background:var(--ok-bg);color:var(--ok);}
.nesp{background:var(--wa-bg);color:var(--wa);}
.ped{background:var(--az-bg);color:var(--az2);}
</style>
</head>
<body>

<header>
  <div class="hico">📑</div>
  <div>
    <h1>Bônus 2025 – Diagnóstico Baseado no PDF (GOE)</h1>
    <p>Jacareí/SP • Códigos Oficiais da Tabela I, II e III do Documento PDF</p>
  </div>
</header>

<nav>
  <button class="tab on" onclick="aba('calc',this)">🧮 Diagnóstico</button>
  <button class="tab" onclick="aba('ref',this)">📖 Tabela do PDF (Consulta)</button>
</nav>

<div id="pnl-calc" class="pnl on"><div class="wrap"><div class="grid">
  <div>
    <div class="card" style="background:var(--az-bg); border:2px dashed var(--az3); padding:1rem;">
        <label>🚀 Colar Linhas do Portalnet (image_827a12.png)</label>
        <textarea id="raw-portalnet" placeholder="Cole as linhas aqui..." oninput="importarPortalnet(this.value)" style="height:60px; margin-top:5px;"></textarea>
    </div>
    <div class="card">
        <div class="ctit">Perfil do Servidor</div>
        <div class="g2">
            <div class="f"><label>Nome</label><input id="nome" placeholder="Nome do Professor"></div>
            <div class="f">
                <label>Situação Funcional</label>
                <select id="sit-func" onchange="analisar()">
                    <option value="reg">Titular / Categoria O</option>
                    <option value="qa">Quadro de Apoio (Grau 0)</option>
                </select>
            </div>
        </div>
    </div>
    <div id="cont-linhas"></div>
  </div>
  <div id="resultado"></div>
</div></div></div>

<div id="pnl-ref" class="pnl"><div class="wrap">
    <div class="card">
        <div class="ctit">Códigos Oficiais Extraídos do PDF</div>
        <table class="tref">
            <thead><tr><th>Cód</th><th>Disciplina</th><th>Classificação</th></tr></thead>
            <tbody id="corpo-disc"></tbody>
        </table>
    </div>
</div></div>

<script>
// CÓDIGOS EXTRAÍDOS FIELMENTE DO PDF ENVIADO (Tabela I, II e III)
const DISCIPLINAS = [
    {cod:"1100", nome:"LÍNGUA PORTUGUESA", tipo:"Específica"},
    {cod:"1300", nome:"MATEMÁTICA", tipo:"Específica"},
    {cod:"1500", nome:"CIÊNCIAS FÍSICAS E BIOLÓGICAS", tipo:"Específica"},
    {cod:"1600", nome:"HISTÓRIA", tipo:"Específica"},
    {cod:"1700", nome:"GEOGRAFIA", tipo:"Específica"},
    {cod:"1900", nome:"EDUCAÇÃO FÍSICA", tipo:"Específica"},
    {cod:"1200", nome:"INGLÊS", tipo:"Não Específica"},
    {cod:"1800", nome:"ARTE", tipo:"Não Específica"},
    {cod:"2000", nome:"FÍSICA", tipo:"Específica"},
    {cod:"2100", nome:"QUÍMICA", tipo:"Específica"},
    {cod:"2200", nome:"BIOLOGIA", tipo:"Específica"},
    {cod:"2300", nome:"SOCIOLOGIA", tipo:"Específica"},
    {cod:"2400", nome:"FILOSOFIA", tipo:"Específica"},
    {cod:"0400", nome:"EDUCAÇÃO ESPECIAL", tipo:"Pedagógica"},
    {cod:"0500", nome:"SALA DE RECURSOS", tipo:"Pedagógica"},
    {cod:"1400", nome:"CLASSE COMUM (ANOS INICIAIS)", tipo:"Pedagógica"},
    {cod:"7800", nome:"PROJETO DE VIDA", tipo:"Não Específica"},
    {cod:"7900", nome:"TECNOLOGIA E INOVAÇÃO", tipo:"Não Específica"},
    {cod:"8468", nome:"SOCIOLOGIA (EXPANSÃO/INOVA)", tipo:"Não Específica"}
];

function init() {
    const corpo = document.getElementById('corpo-disc');
    DISCIPLINAS.sort((a,b) => a.cod - b.cod).forEach(d => {
        let classe = d.tipo === 'Específica' ? 'esp' : (d.tipo === 'Pedagógica' ? 'ped' : 'nesp');
        corpo.innerHTML += `<tr><td><strong>${d.cod}</strong></td><td>${d.nome}</td><td><span class="badge ${classe}">${d.tipo}</span></td></tr>`;
    });
}
init();

function aba(id, btn) {
    document.querySelectorAll('.pnl').forEach(p => p.classList.remove('on'));
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('on'));
    document.getElementById('pnl-' + id).classList.add('on');
    btn.classList.add('on');
}

let _lc = 0;
function importarPortalnet(texto) {
    if (!texto.trim()) return;
    document.getElementById('cont-linhas').innerHTML = ''; _lc = 0;
    const linhas = texto.split('\n');
    linhas.forEach(linha => {
        const col = linha.split(/\t|\s{2,}/).map(s => s.trim());
        if (col.length >= 10) {
            // No Portalnet, se o código vier com 4 dígitos (ex: 1100), o sistema vai achar
            addLinha({ini:col[0], fim:col[1], dias:col[3], disc:col[10], grau:col[8], idesp:col[11], ua:col[13]});
        }
    });
    analisar();
}

function addLinha(d) {
    _lc++; const n = _lc;
    // Busca exata pelo código de 4 dígitos do PDF
    const discObj = DISCIPLINAS.find(x => x.cod === d.disc);
    const div = document.createElement('div');
    div.className = 'lp';
    div.innerHTML = `
        <div style="font-weight:700; margin-bottom:5px; color:var(--az2)">
            Lançamento ${n} - ${discObj ? discObj.nome + ' (' + discObj.tipo + ')' : 'Código Desconhecido: ' + d.disc}
        </div>
        <div class="g4">
            <div class="f"><label>Dias</label><input type="number" id="l${n}-dias" value="${d.dias||''}" oninput="analisar()"></div>
            <div class="f"><label>UA</label><input id="l${n}-ua" value="${d.ua||''}"></div>
            <div class="f"><label>Grau</label><input id="l${n}-grau" value="${d.grau||''}"></div>
            <div class="f"><label>IDESP</label><input id="l${n}-idesp" value="${d.idesp||''}"></div>
        </div>
        <div id="la-${n}" class="lp-alert"></div>`;
    document.getElementById('cont-linhas').appendChild(div);
}

function analisar() {
    const dias = Array.from(document.querySelectorAll('[id$="-dias"]')).reduce((a, e) => a + (parseInt(e.value) || 0), 0);
    const elegivel = dias >= 244;
    
    document.querySelectorAll('.lp').forEach((_, i) => {
        const n = i+1; 
        const ua = document.getElementById(`l${n}-ua`).value;
        const idesp = parseFloat(document.getElementById(`l${n}-idesp`).value) || 0;
        const al = document.getElementById(`la-${n}`);
        let err = [];
        if(!ua || ua === '0') err.push("UA não vinculada no PAEF.");
        if(idesp === 0 && dias > 1) err.push("IDESP não carregado para este código.");
        
        if(err.length > 0) { 
            al.className = 'lp-alert show err'; al.innerHTML = `🚨 ${err.join(' ')}`;
        } else { al.className = 'lp-alert show ok'; al.innerHTML = '✅ Lançamento em conformidade com o PDF.'; }
    });

    document.getElementById('resultado').innerHTML = `
        <div class="card" style="border-top: 5px solid ${elegivel?'var(--ok)':'var(--er)'}">
            <div class="ctit">Diagnóstico Final</div>
            <div style="font-size:1.2rem; font-weight:700; color:${elegivel?'var(--ok)':'var(--er)'}">
                ${elegivel ? '✅ SERVIDOR ELEGÍVEL' : '🚨 NÃO ELEGÍVEL'}
            </div>
            <p>Total de Exercício: <strong>${dias} dias</strong> (Mínimo 244)</p>
            <hr style="margin:10px 0; opacity:0.1">
            <p style="font-size:0.75rem; color:var(--gr)">Códigos validados conforme Tabela de Disciplinas Específicas e Não Específicas (PDF SEDUC).</p>
        </div>`;
}
</script>
</body>
</html>
