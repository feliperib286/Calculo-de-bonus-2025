<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Bônus 2025 – Auditoria por Vínculo de Cargo</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{
            --az:#0D2B55; --az2:#1A4A8A; --az3:#3B82F6; --az-bg:#EBF2FB;
            --ok:#14532D; --ok-bg:#DCFCE7; --er:#7F1D1D; --er-bg:#FEE2E2;
            --bd:#D1D5DB; --wh:#fff; --r:10px;
        }
        body{ font-family: 'Inter', sans-serif; background:#F1F5F9; color:#1e2836; font-size:13px; margin:0; }
        header{ background: var(--az); color:#fff; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; }
        .container{ max-width: 1200px; margin: 1.5rem auto; display: grid; grid-template-columns: 350px 1fr; gap: 1.5rem; padding: 0 1rem; }
        .card{ background:var(--wh); border:1px solid var(--bd); border-radius:var(--r); padding:1.2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .ctit{ font-family:'Sora'; font-size:.7rem; font-weight:700; text-transform:uppercase; color:var(--az2); margin-bottom:1rem; border-left:3px solid var(--az3); padding-left:8px; }
        
        /* Estilo dos Selects e Inputs */
        select, input, textarea { width:100%; padding:10px; border:1.5px solid var(--bd); border-radius:8px; margin-bottom:10px; font-family:inherit; }
        textarea { height: 100px; background: var(--az-bg); font-family: monospace; font-size: 11px; }
        
        .ua-group { margin-bottom: 2rem; }
        table { width:100%; border-collapse: collapse; background:#fff; border-radius:8px; overflow:hidden; margin-top:10px; }
        th { background: var(--az-bg); color: var(--az); padding: 10px; text-align: left; font-size: 11px; border-bottom: 2px solid var(--bd); }
        td { padding: 10px; border-bottom: 1px solid #eee; font-size: 11px; }
        
        .row-err { background-color: var(--er-bg); }
        .badge { padding: 2px 6px; border-radius: 4px; font-weight: 700; font-size: 9px; }
        .badge-ok { background: var(--ok-bg); color: var(--ok); }
        .badge-err { background: var(--er-bg); color: var(--er); }
        
        .total-box { font-size: 1.5rem; font-weight: 800; color: var(--az); margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div>
        <h1 style="margin:0; font-size:1.2rem;">Calculadora Bônus 2025</h1>
        <span>Foco em Vínculo e Carga Horária</span>
    </div>
</header>

<div class="container">
    <aside>
        <div class="card">
            <div class="ctit">1. Definir Cargo e Regra</div>
            <label>Selecione o Cargo:</label>
            <select id="select-cargo" onchange="atualizarRegras()">
                <option value="PEB1">PEB I (Anos Iniciais / Grau Branco)</option>
                <option value="PEB2">PEB II (Anos Finais e Médio / Grau 1 e 2)</option>
                <option value="SUP">Carga Suplementar (Regra 2800)</option>
                <option value="ADM">Administrativo / Unidade Regional</option>
            </select>
            
            <div id="config-especifica" style="display:none;">
                <label>Vínculo de Disciplina:</label>
                <select id="tipo-vinculo" onchange="processarTabela()">
                    <option value="ESP">Disciplina Específica (100% do Índice)</option>
                    <option value="NESP">Disciplina Não Específica (Regra Proporcional)</option>
                </select>
            </div>
        </div>

        <div class="card">
            <div class="ctit">2. Importar Portalnet</div>
            <textarea id="raw-data" placeholder="Cole as colunas do Portalnet aqui..." oninput="processarTabela()"></textarea>
        </div>

        <div class="card">
            <div class="ctit">3. Forçar IDESP por UA</div>
            <div id="lista-idesp-manual"></div>
        </div>
    </aside>

    <main>
        <div class="card">
            <div class="ctit">Demonstrativo de Cálculo</div>
            <div id="res-tabela">Aguardando dados...</div>
            
            <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
            
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <div class="ctit">Total Geral Calculado</div>
                    <div id="val-total" class="total-box">R$ 0,00</div>
                </div>
                <div id="res-dias" style="text-align:right"></div>
            </div>
        </div>

        <div id="card-recurso" class="card" style="display:none; border-top: 5px solid var(--er);">
            <div class="ctit" style="color:var(--er)">Inconsistência Detectada</div>
            <div id="txt-recurso" style="font-size:11px; line-height:1.5;"></div>
        </div>
    </main>
</div>

<script>
let memoriaUA = new Map();

function atualizarRegras() {
    const cargo = document.getElementById('select-cargo').value;
    const divEsp = document.getElementById('config-especifica');
    
    // PEB II habilita escolha de Específica/Não Específica (conforme o PDF que você mandou)
    divEsp.style.display = (cargo === 'PEB2') ? 'block' : 'none';
    
    processarTabela();
}

function processarTabela() {
    const texto = document.getElementById('raw-data').value.trim();
    if (!texto) return;

    const cargo = document.getElementById('select-cargo').value;
    const vinculo = document.getElementById('tipo-vinculo').value;
    
    // Regex para identificar início de linha por data
    const regexLinha = /(\d{2}\/\d{2}\/\d{4}.+?)(?=\d{2}\/\d{2}\/\d{4}|$)/gs;
    const linhas = texto.match(regexLinha);
    if (!linhas) return;

    const uas = {};
    const todasUAs = new Set();

    linhas.forEach(l => {
        const col = l.split(/\t|\s{1,}/).filter(x => x.trim() !== "");
        if (col.length >= 15) {
            const ua = col[13];
            todasUAs.add(ua);
            if (!uas[ua]) uas[ua] = [];

            // Captura de valores (tratando vírgula e ponto)
            const idespPortal = parseFloat(col[12].replace(",", ".")) || 0;
            const vHora = parseFloat(col[17].replace("R$", "").replace(/\./g, "").replace(",", ".")) || 0;
            const dias = parseInt(col[3]) || 0;
            const peso = parseFloat(col[6].replace(",", ".")) || 0;
            
            // Regra de Negócio: Se tiver IDESP manual na lateral, usa ele.
            const idespFinal = memoriaUA.has(ua) ? memoriaUA.get(ua) : idespPortal;

            // Cálculo do Total
            const total = vHora * dias * (peso / 100) * idespFinal;

            uas[ua].push({
                periodo: col[0] + ' a ' + col[1],
                disc: col[10],
                idesp: idespFinal,
                total: total,
                err: idespFinal === 0
            });
        }
    });

    renderizar(uas, todasUAs);
}

function renderizar(uas, todasUAs) {
    const container = document.getElementById('res-tabela');
    const panelManual = document.getElementById('lista-idesp-manual');
    let htmlTotal = "";
    let somaGeral = 0;
    let temErro = false;

    // Atualiza painel de IDESP manual
    let htmlManual = "";
    todasUAs.forEach(ua => {
        const val = memoriaUA.get(ua) || "";
        htmlManual += `<label style="font-size:10px">UA ${ua}:</label>
                       <input type="number" step="0.0001" value="${val}" 
                       onchange="memoriaUA.set('${ua}', parseFloat(this.value)); processarTabela()" 
                       placeholder="Ex: 6.4500">`;
    });
    panelManual.innerHTML = htmlManual || "<small>Aguardando UA...</small>";

    // Constrói a tabela de resultados
    for (let ua in uas) {
        htmlTotal += `<div class="ua-group"><strong>Unidade Administrativa: ${ua}</strong>`;
        htmlTotal += `<table><thead><tr><th>Período</th><th>Disciplina</th><th>IDESP Aplicado</th><th>Valor Parcial</th></tr></thead><tbody>`;
        
        uas[ua].forEach(item => {
            somaGeral += item.total;
            if (item.err) temErro = true;
            htmlTotal += `<tr class="${item.err ? 'row-err' : ''}">
                <td>${item.periodo}</td>
                <td>${item.disc}</td>
                <td>${item.idesp.toFixed(4)} ${item.err ? '<span class="badge badge-err">ZERADO</span>' : ''}</td>
                <td>R$ ${item.total.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
            </tr>`;
        });
        htmlTotal += `</tbody></table></div>`;
    }

    container.innerHTML = htmlTotal;
    document.getElementById('val-total').innerText = somaGeral.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});

    // Gera o texto do recurso automático
    const cardRecurso = document.getElementById('card-recurso');
    if (temErro) {
        cardRecurso.style.display = "block";
        document.getElementById('txt-recurso').innerText = `O servidor apresenta inconsistência no bônus devido ao IDESP zerado em períodos da UA(s) pesquisada(s). Solicitamos correção via PAEF/URE conforme LC 1.361/2021 para que o cálculo reflita a carga horária efetivamente trabalhada.`;
    } else {
        cardRecurso.style.display = "none";
    }
}
</script>

</body>
</html>
